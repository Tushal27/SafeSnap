name: safesnap
description: SafeSnap — privacy-first parental control app for children's phones.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # Networking
  dio: ^5.4.3

  # ML inference
  tflite_flutter: '>=0.10.4 <2.0.0'

  # Image processing
  image: ^4.1.7

  # Date formatting
  intl: ^0.19.0

  # Permissions
  permission_handler: ^11.3.1

  # QR scanning
  mobile_scanner: ^5.1.1

  # Background tasks
  workmanager: ^0.6.0

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.0

  # Cryptography
  crypto: ^3.0.3

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/models/
