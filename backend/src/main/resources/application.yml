spring:
  application:
    name: safesnap-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-snowy-fire-anh3711w-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
    username: ${SPRING_DATASOURCE_USERNAME:neondb_owner}
    password: ${SPRING_DATASOURCE_PASSWORD:npg_lc4tfx5XhHAk}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:polite-pug-76093.upstash.io}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:gQAAAAAAASk9AAIgcDFhM2Y5YzNlODQ2ZDg0MzJhOGU4N2MwNzFlZDY4ZjQzOQ}
      ssl:
        enabled: ${REDIS_SSL:true}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
  compression:
    enabled: true
    mime-types: application/json

safesnap:
  jwt:
    secret: ${JWT_SECRET:1709048e29be1aa565e32d869b4d3cbf}
    access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:15}
    refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
  pairing:
    token-ttl-seconds: ${PAIRING_TOKEN_TTL_SECONDS:300}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:https://safesnap.vercel.app}

logging:
  level:
    com.safesnap: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
