spring:
  application:
    name: safesnap-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:safesnap}
    username: ${DB_USERNAME:safesnap}
    password: ${DB_PASSWORD:safesnap}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
  compression:
    enabled: true
    mime-types: application/json

safesnap:
  jwt:
    secret: ${JWT_SECRET:changeme-this-must-be-at-least-32-characters-long-for-hs256}
    access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:15}
    refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
  pairing:
    token-ttl-seconds: ${PAIRING_TOKEN_TTL_SECONDS:300}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:https://safesnap.vercel.app}

logging:
  level:
    com.safesnap: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
